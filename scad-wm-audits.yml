name: wm-audits

gpu: true

repos:
  world-model-audits:
    path: ~/Dropbox/code/world-model-audits
    workdir: true
  latent-world-physics:
    path: ~/Dropbox/code/latent-world-physics
    add_dir: true
    pip_install: true
  parametric-lunar-lander:
    path: ~/Dropbox/code/parametric-lunar-lander
    add_dir: true
    pip_install: true
  traitful-docs:
    path: ~/Dropbox/traitful-code/traitful-docs
    add_dir: true

mounts:
  - host: /media/hdd1/physics-priors-latent-space
    container: /media/hdd1/physics-priors-latent-space
  - host: ~/vsr-tmp
    container: /home/scad/vsr-tmp

python:
  version: "3.12"
  requirements: requirements.txt

apt_packages:
  - swig
  - build-essential

claude:
  dangerously_skip_permissions: true
  plugins:
    - superpowers
